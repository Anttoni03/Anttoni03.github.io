        function getWeekIndex() {
            const initDay = new Date("2025-02-08");
            const today = new Date();
            const diff = today - initDay;
            const diffDays = Math.floor(diff / (1000 * 60 * 60 * 24));
            const diffWeeks = Math.floor(diffDays / 7);
            return diffWeeks;
        }
